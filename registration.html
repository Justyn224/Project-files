<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="registration-style.css">
</head>
<body>

<div class="form-container">
    <h2>Create Your Account</h2>
    <form id="registrationForm">
        <div class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter at least two names">
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@domain.com">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min. 8 chars, 1 Uppercase, 1 Number, 1 Special">
        </div>

        <div class="input-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your password">
        </div>

        <div class="input-group">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Must be 18+">
        </div>

        <button type="submit">Register</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
